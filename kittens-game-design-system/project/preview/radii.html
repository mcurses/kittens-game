<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 16px; background: var(--bg); }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .b { width: 64px; height: 64px; background: var(--accent); border: 1px solid var(--border-strong); }
  .lbl { font-family: var(--font-mono); font-size: 12px; color: var(--ink-2); margin-top: 6px; text-align: center; }
  .col { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="b" style="border-radius:0"></div><div class="lbl">none / 0</div></div>
    <div class="col"><div class="b" style="border-radius:2px"></div><div class="lbl">--r-sm / 2</div></div>
    <div class="col"><div class="b" style="border-radius:4px"></div><div class="lbl">--r-md / 4</div></div>
    <div class="col"><div class="b" style="border-radius:8px"></div><div class="lbl">--r-lg / 8</div></div>
    <div class="col"><div class="b" style="border-radius:12px"></div><div class="lbl">--r-xl / 12</div></div>
  </div>
</body>
</html>
