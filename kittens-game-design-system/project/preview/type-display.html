<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body { padding: 24px 28px; font-family: var(--font-body); }
  .head {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 8px;
    border-bottom: 1px dashed var(--border);
  }
  .head h2 {
    margin: 0;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
  }
  .head .role {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px;
  }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 16px;
    align-items: baseline;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--border);
  }
  .row:last-child { border: 0; }
  .lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-top: 6px;
  }
  .pixel { font-family: var(--font-display); color: var(--ink); }
  .accent { color: var(--accent); }
  .tiny  { font-family: var(--font-pixel); letter-spacing: 2px; text-transform: uppercase; color: var(--ink-3); }
</style>
</head>
<body>

  <div class="head">
    <h2>Display headlines</h2>
    <span class="role">— DePixel · brand pixel face</span>
  </div>

  <div class="stack">
    <div class="row">
      <div class="lbl">wordmark</div>
      <div class="pixel" style="font-family:var(--font-display-wide); font-size:34px; line-height:1.1">Kittens Game</div>
    </div>
    <div class="row">
      <div class="lbl">display 40</div>
      <div class="pixel" style="font-size:40px; font-weight:700; line-height:1.05">Catnip Forest</div>
    </div>
    <div class="row">
      <div class="lbl">h1 28</div>
      <div class="pixel" style="font-size:28px; font-weight:700; line-height:1.15">Iron Will</div>
    </div>
    <div class="row">
      <div class="lbl">h2 22</div>
      <div class="pixel accent" style="font-size:22px; font-weight:400">Bonfire</div>
    </div>
    <div class="row">
      <div class="lbl">tab · schmal</div>
      <div class="pixel" style="font-family:var(--font-display-narrow); font-size:18px; color:var(--accent)">Workshop · Religion · Space</div>
    </div>
    <div class="row">
      <div class="lbl">label 14</div>
      <div class="pixel" style="font-size:14px; color:var(--ink-2)">Catnip field</div>
    </div>
    <div class="row">
      <div class="lbl">eyebrow 10</div>
      <div class="tiny" style="font-size:10px">Spring · Year 14 · Day 3</div>
    </div>
  </div>

</body>
</html>
