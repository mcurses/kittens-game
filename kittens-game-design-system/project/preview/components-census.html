<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Census kitten card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 14px; background: var(--bg); }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .k { display: flex; gap: 10px; align-items: center; padding: 8px 10px; background: var(--surface-1); border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-body); font-size: 13px;}
  .k.leader { border-color: var(--info); background: rgba(27,156,194,0.06); }
  .av { width: 32px; height: 32px; background: var(--surface-3); border: 1px solid var(--border-strong); border-radius: 2px; image-rendering: pixelated; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .meta { flex: 1; }
  .name { color: var(--ink); font-weight: 600; }
  .name.leader { color: var(--info); }
  .info { font-size: 12px; color: var(--ink-3); }
  .skill { color: var(--info); font-size: 12px; }
  .skill.unassigned { color: var(--ink-3); font-style: italic; }
  .dingbat { color: var(--info); margin-right: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="k leader"><div class="av">★</div><div class="meta"><div class="name leader"><span class="dingbat">★</span>Mira (engineer)</div><div class="info">23 yrs · ♀ · Calm · Stamina +14%</div></div><div class="skill">leader</div></div>
    <div class="k"><div class="av">🐾</div><div class="meta"><div class="name">Pip</div><div class="info">14 yrs · ♂ · Bold</div></div><div class="skill">scholar</div></div>
    <div class="k"><div class="av">🐾</div><div class="meta"><div class="name">Tarn</div><div class="info">9 yrs · ♂ · Curious</div></div><div class="skill unassigned">unassigned</div></div>
  </div>
</body>
</html>
